<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Snake — DQN AI</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="top-bar">
  <div class="stat"><span class="stat-label">EPISODE</span><span class="stat-val" id="s-ep">1</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">SCORE</span><span class="stat-val" id="s-score">0</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">BEST</span><span class="stat-val" id="s-best">0</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">EPSILON</span><span class="stat-val" id="s-eps">1.00</span></div>
  <div class="sep"></div>
  <div class="stat"><span class="stat-label">STEPS</span><span class="stat-val" id="s-steps">0</span></div>
  <div id="speed-wrap">
    <label>SPEED</label>
    <input type="range" id="speed" min="1" max="20" value="5" step="1"/>
    <span id="speed-val">5x</span>
  </div>
</div>
<div id="main">
  <div id="game-wrap"><canvas id="game-canvas"></canvas></div>
  <div id="info-wrap">
    <canvas id="q-canvas"></canvas>
    <canvas id="reward-canvas"></canvas>
    <canvas id="nn-canvas"></canvas>
  </div>
</div>
<script src="js/pause.js"></script>
<script src="js/dqn.js"></script>
<script src="js/game.js"></script>
<script src="js/nn-draw.js"></script>
<script src="js/main.js"></script>
<div style="position:fixed;bottom:10px;right:14px;font-family:Courier New,monospace;font-size:9px;color:#0f2010;letter-spacing:2px;z-index:100;pointer-events:none">[P] / [SPACE] PAUSE</div>
</body>
</html>
